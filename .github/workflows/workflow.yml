name: Python Package CI/CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set Up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Upgrade Pip & Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # ruff pinned to match the `lint` dependency-group in pyproject.toml
          # so CI lint results are identical to local.
          python -m pip install build pytest ruff==0.15.5
          # Editable install so `import ab` resolves to the checkout. The gate
          # evaluator and several tests locate tests/fixtures/ relative to
          # ab.__file__; a non-editable install would point them at
          # site-packages (where tests/ is not shipped) and fail spuriously.
          pip install -e .

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests (deterministic — excludes live API tests)
        run: pytest -m "not live"

      - name: Check progress report is current (no-drift gate)
        run: python scripts/generate_progress.py --check

  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'

    permissions:
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set Up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Remove Old Build Artifacts
        run: rm -rf dist build annex_abconnect.egg-info

      - name: Install Build Tools
        run: python -m pip install --upgrade build twine

      - name: Build Package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
