# Read the Docs configuration for the AB SDK.
# Public documentation: https://ab-sdk.readthedocs.io/
#
# Reference: https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  jobs:
    post_create_environment:
      - pip install --upgrade pip
    post_install:
      # Install the package itself so sphinx.ext.autodoc can import `ab.*`
      # plus the docs toolchain pinned in pyproject.toml's [dependency-groups.docs].
      - pip install -e .
      - pip install "sphinx>=7.0" "sphinx-rtd-theme>=2.0" "myst-parser>=3.0"

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

formats:
  - htmlzip
